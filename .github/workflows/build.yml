name: Build ZMK Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialize west workspace
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Build ZMK Firmware
        run: |
          west build -d config/boards/xiao_ble -b seeed_xiao_ble -- -DSHIELD=paw3950

      - name: Upload built firmware
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware
          path: build/zephyr/zmk.uf2