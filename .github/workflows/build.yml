name: Build ZMK Firmware

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    container: zmkfirmware/zmk-build-arm:stable

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Initialize west workspace
        run: |
          west init -l .
          west update --narrow -o=--depth=1 2>&1 | head -n 100
          west zephyr-export

      - name: Build ZMK Firmware
        run: |
          west build -d build/seeed_xiao_ble -b seeed_xiao_ble -- -DZMK_CONFIG=${GITHUB_WORKSPACE}/config

      - name: Upload built firmware
        uses: actions/upload-artifact@v4
        with:
          name: zmk-firmware-seeed_xiao_ble
          path: |
            build/seeed_xiao_ble/zephyr/*.uf2
            build/seeed_xiao_ble/zephyr/*.hex